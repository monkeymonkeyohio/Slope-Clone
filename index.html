<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Slope Pro</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
        #ui { position: absolute; top: 20px; left: 20px; color: #0f0; font-size: 28px; font-weight: bold; z-index: 10; text-shadow: 2px 2px #000; }
        #menu { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 20; color: #0f0; }
        button { padding: 15px 40px; font-size: 20px; background: #0f0; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>
    <div id="ui">SCORE: 0</div>
    <div id="menu">
        <h1>SLOPE PRO</h1>
        <button id="startBtn">START MISSION</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, ball;
        let chunks = [], obstacles = [];
        let score = 0, speed = 0.7, active = false;
        let moveLeft = false, moveRight = false;
        let lastChunkZ = 0;

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x000000, 10, 100);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Neon Lighting
            scene.add(new THREE.AmbientLight(0x404040));
            const light = new THREE.PointLight(0x00ff00, 1, 100);
            light.position.set(0, 10, 0);
            scene.add(light);

            // The Ball
            ball = new THREE.Mesh(
                new THREE.SphereGeometry(0.5, 32, 32),
                new THREE.MeshStandardMaterial({ color: 0x00ff00, emissive: 0x00ff00, emissiveIntensity: 0.5 })
            );
            ball.position.y = 0.5;
            scene.add(ball);

            // Initial Track Chunks
            for(let i=0; i<10; i++) {
                createChunk();
            }

            camera.position.set(0, 4, 8);
            
            window.onkeydown = (e) => { if(e.key == "ArrowLeft" || e.key == "a") moveLeft = true; if(e.key == "ArrowRight" || e.key == "d") moveRight = true; };
            window.onkeyup = (e) => { if(e.key == "ArrowLeft" || e.key == "a") moveLeft = false; if(e.key == "ArrowRight" || e.key == "d") moveRight = false; };
            document.getElementById('startBtn').onclick = () => { document.getElementById('menu').style.display='none'; active=true; };
            
            animate();
        }

        function createChunk() {
            const width = 8;
            const length = 20;
            const group = new THREE.Group();

            // The Platform
            const geo = new THREE.BoxGeometry(width, 0.5, length);
            const mat = new THREE.MeshStandardMaterial({ color: 0x111111 });
            const platform = new THREE.Mesh(geo, mat);
            group.add(platform);

            // Neon Grid Lines
            const grid = new THREE.GridHelper(width, 2, 0x00ff00, 0x004400);
            grid.position.y = 0.3;
            grid.rotation.x = 0;
            group.add(grid);

            // Random Slope/Ramp Tilt
            group.rotation.x = (Math.random() - 0.5) * 0.15; 
            group.position.z = lastChunkZ - length/2;
            group.position.y = Math.sin(lastChunkZ * 0.05) * 2; // Create hilly terrain

            // Spawn Obstacle on this chunk (except the very first ones)
            if(lastChunkZ < -40) {
                const obsGeo = new THREE.BoxGeometry(1, 1, 1);
                const obsMat = new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0xff0000 });
                const obs = new THREE.Mesh(obsGeo, obsMat);
                obs.position.set((Math.random() - 0.5) * 6, 0.8, 0);
                group.add(obs);
                obstacles.push(obs);
            }

            scene.add(group);
            chunks.push(group);
            lastChunkZ -= length;
        }

        function animate() {
            requestAnimationFrame(animate);
            if(!active) return;

            // 1. Horizontal Movement
            if(moveLeft) ball.position.x -= 0.15;
            if(moveRight) ball.position.x += 0.15;
            ball.position.x = Math.max(Math.min(ball.position.x, 3.8), -3.8);
            ball.rotation.x -= 0.15;

            // 2. The "Sticky Floor" Logic (Raycasting)
            // We shoot a ray from high above the ball straight down
            const raycaster = new THREE.Raycaster(
                new THREE.Vector3(ball.position.x, 10, ball.position.z), 
                new THREE.Vector3(0, -1, 0)
            );
            
            // Check which chunk the ball is currently over
            const intersects = raycaster.intersectObjects(chunks, true);

            if (intersects.length > 0) {
                // Set ball y-position to the floor height + the ball's radius (0.5)
                ball.position.y = intersects[0].point.y + 0.5;
            }

            // 3. Move Chunks
            chunks.forEach((chunk, index) => {
                chunk.position.z += speed;

                if(chunk.position.z > 20) {
                    scene.remove(chunk);
                    chunks.splice(index, 1);
                    createChunk();
                    score++;
                    speed += 0.001;
                    document.getElementById('ui').innerText = "SCORE: " + score;
                }
            });

            // 4. Collision Check
            obstacles.forEach(obs => {
                const worldPos = new THREE.Vector3();
                obs.getWorldPosition(worldPos);
                if(ball.position.distanceTo(worldPos) < 0.9) {
                    active = false;
                    alert("CRASHED! FINAL SCORE: " + score);
                    location.reload();
                }
            });

            // Adjust camera to follow the ball's new height smoothly
            camera.position.y = ball.position.y + 3.5;
            camera.lookAt(ball.position);
            
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
