<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Slope Clone</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; }
        #score {
            position: absolute;
            top: 20px; left: 20px;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            font-size: 28px;
            font-weight: bold;
            z-index: 1;
            text-shadow: 2px 2px #000;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="score">Score: 0</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, player, track;
        let obstacles = [];
        let score = 0;
        let speed = 0.4; // Base speed
        let playerX = 0;
        const maxX = 2.2;
        let moveLeft = false;
        let moveRight = false;
        let isGameOver = false;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x000000, 10, 50);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 3, 6);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const sun = new THREE.DirectionalLight(0x00ff00, 1);
            sun.position.set(5, 10, 5);
            scene.add(sun);

            // Player Ball
            const sphereGeo = new THREE.SphereGeometry(0.4, 32, 32);
            const sphereMat = new THREE.MeshStandardMaterial({ color: 0x00ff00, emissive: 0x004400 });
            player = new THREE.Mesh(sphereGeo, sphereMat);
            player.position.y = 0.4;
            scene.add(player);

            // Infinite-ish Track
            const trackGeo = new THREE.BoxGeometry(6, 0.2, 200);
            const trackMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
            track = new THREE.Mesh(trackGeo, trackMat);
            track.position.z = -80;
            track.rotation.x = 0.05; // The "Slope" tilt
            scene.add(track);

            // Create Initial Obstacles
            for (let i = 0; i < 20; i++) {
                addObstacle(-20 - (i * 10));
            }

            window.addEventListener('resize', onWindowResize);
            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowLeft' || e.key === 'a') moveLeft = true;
                if (e.key === 'ArrowRight' || e.key === 'd') moveRight = true;
            });
            document.addEventListener('keyup', (e) => {
                if (e.key === 'ArrowLeft' || e.key === 'a') moveLeft = false;
                if (e.key === 'ArrowRight' || e.key === 'd') moveRight = false;
            });
        }

        function addObstacle(zPos) {
            const size = 0.8;
            const geometry = new THREE.BoxGeometry(size, size, size);
            const material = new THREE.MeshStandardMaterial({ color: 0xff0033, emissive: 0x330000 });
            const box = new THREE.Mesh(geometry, material);
            box.position.y = size / 2;
            box.position.z = zPos;
            box.position.x = (Math.random() - 0.5) * (maxX * 2);
            scene.add(box);
            obstacles.push(box);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            if (isGameOver) return;
            requestAnimationFrame(animate);

            // Player lateral movement
            if (moveLeft) playerX -= 0.12;
            if (moveRight) playerX += 0.12;
            playerX = Math.max(Math.min(playerX, maxX), -maxX);
            player.position.x = playerX;
            
            // Subtle tilt for the ball
            player.rotation.z = -playerX * 0.5;

            // Move obstacles toward player
            for (let i = 0; i < obstacles.length; i++) {
