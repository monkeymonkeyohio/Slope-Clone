<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Slope Clone</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; font-family: 'Courier New', Courier, monospace; }
        #score {
            position: absolute;
            top: 20px; left: 20px;
            color: #00ff00;
            font-size: 28px;
            font-weight: bold;
            z-index: 1;
            text-shadow: 2px 2px #000;
            pointer-events: none;
        }
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 10; color: #00ff00;
        }
        button {
            padding: 15px 30px; font-size: 20px; background: #00ff00; color: #000;
            border: none; cursor: pointer; font-family: inherit; font-weight: bold;
        }
        button:hover { background: #00cc00; }
    </style>
</head>
<body>
    <div id="score">Score: 0</div>
    <div id="overlay">
        <h1>SLOPE CLONE</h1>
        <p>Use Arrows or AD to Move</p>
        <button onclick="startGame()">START GAME</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, player, track;
        let obstacles = [];
        let score = 0;
        let speed = 0.5;
        let playerX = 0;
        const maxX = 2.4;
        let moveLeft = false;
        let moveRight = false;
        let isGameOver = false;
        let gameActive = false;

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x000000, 10, 60);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 3, 7);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            const sun = new THREE.DirectionalLight(0x00ff00, 1);
            sun.position.set(5, 10, 5);
            scene.add(sun);

            // Player
            player = new THREE.Mesh(
                new THREE.SphereGeometry(0.4, 32, 32),
                new THREE.MeshStandardMaterial({ color: 0x00ff00, emissive: 0x003300 })
