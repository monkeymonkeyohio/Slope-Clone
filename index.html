<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Slope Clone</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
        #ui {
            position: absolute; top: 20px; left: 20px; color: #00ff00;
            font-size: 24px; font-weight: bold; z-index: 10; pointer-events: none;
        }
        #menu {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 20; color: #00ff00;
        }
        button {
            padding: 15px 40px; font-size: 20px; cursor: pointer;
            background: #00ff00; border: none; font-family: inherit; font-weight: bold;
            transition: 0.2s;
        }
        button:hover { background: #fff; transform: scale(1.1); }
    </style>
</head>
<body>
    <div id="ui">Score: 0</div>
    <div id="menu">
        <h1>SLOPE CLONE</h1>
        <p>USE ARROW KEYS TO STEER</p>
        <button id="playBtn">START GAME</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, ball, track;
        let obstacles = [];
        let score = 0;
        let speed = 0.6;
        let moveLeft = false;
        let moveRight = false;
        let active = false;

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x000000, 10, 70);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 4, 8);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // Lights
            const sun = new THREE.DirectionalLight(0x00ff00, 1);
            sun.position.set(5, 10, 5);
            scene.add(sun);
            scene.add(new THREE.AmbientLight(0x404040));

            // Ball
            ball = new THREE.Mesh(
                new THREE.SphereGeometry(0.5, 32, 32),
                new THREE.MeshStandardMaterial({ color: 0x00ff00, emissive: 0x003300 })
            );
            ball.position.y = 0.5;
            scene.add(ball);

            // The Floor
            track = new THREE.Mesh(
                new THREE.BoxGeometry(10, 0.1, 2000),
                new THREE.MeshStandardMaterial({ color: 0x111111 })
            );
            track.position.z = -950;
            scene.add(track);

            // Spawn Obstacles
            for(let i = 0; i < 30; i++) {
                spawnObstacle(-40 - (i * 15));
            }

            animate();
        }

        function spawnObstacle(z) {
            const size = Math.random() * 0.6 + 0.5;
            const obs = new THREE.Mesh(
                new THREE.BoxGeometry(size, size, size),
                new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0x440000 })
            );
            obs.position.set((Math.random() - 0.5) * 8, size/2, z);
            scene.add(obs);
            obstacles.push(obs);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (!active) return;

            // Handle Input
