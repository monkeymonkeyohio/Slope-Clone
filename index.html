<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slope Clone</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        #ui {
            position: absolute; top: 20px; left: 20px; color: #00ff00;
            font-size: 24px; font-weight: bold; z-index: 10; pointer-events: none;
        }
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: flex; justify-content: center;
            align-items: center; z-index: 20; color: white; flex-direction: column;
        }
        button {
            padding: 15px 30px; font-size: 20px; cursor: pointer;
            background: #00ff00; border: none; font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="ui">Score: 0</div>
    <div id="overlay">
        <h1>SLOPE CLONE</h1>
        <button id="startBtn">CLICK TO PLAY</button>
    </div>

    <script src="https://unpkg.com/three@0.152.2/build/three.min.js"></script>

    <script>
        let scene, camera, renderer, ball, track;
        let obstacles = [];
        let score = 0;
        let speed = 0.5;
        let moveLeft = false;
        let moveRight = false;
        let gameRunning = false;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Lighting
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(0, 10, 10);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x404040));

            // Ball
            const ballGeo = new THREE.SphereGeometry(0.5, 32, 32);
            const ballMat = new THREE.MeshPhongMaterial({ color: 0x00ff00 });
            ball = new THREE.Mesh(ballGeo, ballMat);
            ball.position.y = 0.5;
            scene.add(ball);

            // Track
            const trackGeo = new THREE.BoxGeometry(10, 0.1, 1000);
            const trackMat = new THREE.MeshPhongMaterial({ color: 0x222222 });
            track = new THREE.Mesh(trackGeo, trackMat);
            track.position.z = -450;
            scene.add(track);

            // Initial obstacles
            for (let i = 0; i < 20; i++) {
                spawnObstacle(-30 - (i * 20));
            }

            camera.position.set(0, 3, 6);
            camera.lookAt(ball.position);

            animate();
        }

        function spawnObstacle(z) {
            const obsGeo = new THREE.BoxGeometry(1, 1, 1);
            const obsMat = new THREE.MeshPhongMaterial({ color: 0xff0000 });
            const obs = new THREE.Mesh(obsGeo, obsMat);
            obs.position.set((Math.random() - 0.5) * 8, 0.5, z);
            scene.add(obs);
            obstacles.push(obs);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (!gameRunning) return;

            // Movement
            if (moveLeft) ball.position.x -= 0.15;
            if (moveRight) ball.position.x += 0.15;
            ball.position.x = Math.max(Math.min(ball.position.x, 4.5), -4.5);

            // Move obstacles
            obstacles.forEach(obs => {
                obs.position.z += speed;
                
                // Collision
                if (ball.position.distanceTo(obs.position) < 0.8) {
                    gameRunning = false;
                    alert("Game Over! Score: " + score);
                    location.reload();
                }

                // Reset obstacle
                if (obs.position.z > 10) {
                    obs.position.z = -400;
                    obs.position.x = (Math.random() - 0.5) * 8;
                    score++;
                    speed += 0.005;
                    document.getElementById('ui').innerText = "Score: " + score;
                }
            });

            camera.lookAt(ball.position);
            renderer.render(scene, camera);
        }

        // Controls
        document.addEventListener('keydown', (e) => {
            if (e.key === "ArrowLeft") moveLeft = true;
            if (e.key === "ArrowRight") moveRight = true;
        });
        document.addEventListener('keyup', (e) => {
            if (e.key === "ArrowLeft") moveLeft = false;
            if (e.key === "ArrowRight") moveRight = false;
        });

        document.getElementById('startBtn').onclick = () => {
            document.getElementById('overlay').style.display = 'none';
            gameRunning = true;
        };

        window.onload = init;
    </script>
</body>
</html>
