<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gemini Slope Clone</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
        #ui { position: absolute; top: 20px; left: 20px; color: #0f0; font-size: 24px; font-weight: bold; z-index: 10; text-shadow: 2px 2px #000; pointer-events: none; }
        #menu { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 20; color: #0f0; text-align: center; }
        button { padding: 15px 40px; font-size: 20px; background: #0f0; border: none; font-family: inherit; font-weight: bold; cursor: pointer; border-radius: 5px; }
        button:hover { background: #fff; }
        canvas { display: block; }
    </style>
</head>
<body>
    <div id="ui">SCORE: 0</div>
    <div id="menu">
        <h1 style="font-size: 48px; margin-bottom: 10px;">SLOPE</h1>
        <p style="margin-bottom: 30px;">USE ARROW KEYS OR AD TO STEER</p>
        <button id="startBtn">START GAME</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, ball, floor, obstacles = [];
        let score = 0, speed = 0.6, active = false;
        let moveLeft = false, moveRight = false;

        function init() {
            // 1. Scene & Camera
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x000000, 10, 80);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 4, 8);

            // 2. Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // 3. Lights
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(5, 10, 7);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x404040));

            // 4. Player (The Ball)
            const ballGeo = new THREE.SphereGeometry(0.5, 32, 32);
            const ballMat = new THREE.MeshPhongMaterial({ color: 0x00ff00, emissive: 0x002200 });
            ball = new THREE.Mesh(ballGeo, ballMat);
            ball.position.y = 0.5;
            scene.add(ball);

            // 5. The Floor (Neon Grid)
            const floorGeo = new THREE.PlaneGeometry(10, 1000);
            const floorMat = new THREE.MeshPhongMaterial({ color: 0x111111, side: THREE.DoubleSide });
            floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.position.z = -450;
            scene.add(floor);

            const grid = new THREE.GridHelper(10, 100, 0x00ff00, 0x004400);
            grid.rotation.x = 0;
            grid.position.y = 0.05;
            floor.add(grid);

            // 6. Spawn Obstacles
            for (let i = 0; i < 25; i++) {
                spawnObstacle(-40 - (i * 20));
            }

            // 7. Input Events
            window.addEventListener('keydown', e => {
                if (e.key === "ArrowLeft" || e.key === "a") moveLeft = true;
                if (e.key === "ArrowRight" || e.key === "d") moveRight = true;
            });
            window.addEventListener('keyup', e => {
                if (e.key === "ArrowLeft" || e.key === "a") moveLeft = false;
                if (e.key === "ArrowRight" || e.key === "d") moveRight = false;
            });

            // Start Logic
            document.getElementById('startBtn').onclick = () => {
                document.getElementById('menu').style.display = 'none';
                active = true;
            };

            window.addEventListener('resize', onResize);
            animate();
        }

        function spawnObstacle(z) {
            const size = Math.random() * 0.8 + 0.4;
            const geo = new THREE.BoxGeometry(size, size, size);
            const mat = new THREE.MeshPhongMaterial({ color: 0xff0000 });
            const box = new THREE.Mesh(geo, mat);
            box.position.set((Math.random() - 0.5) * 8, size / 2, z);
            scene.add(box);
            obstacles.push(box);
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (!active) return;

            // Movement Logic
            if (moveLeft) ball.position.x -= 0.15;
            if (moveRight) ball.position.x += 0.15;
            ball.position.x = Math.max(Math.min(ball.position.x, 4.5), -4.5);
            
            // Rolling Animation
            ball.rotation.x -= 0.15;

            // Obstacle Movement & Collision
            obstacles.forEach(obs => {
                obs.position.z += speed;

                // Collision Detection
                const dist = ball.position.distanceTo(obs.position);
                if (dist < 0.8) {
                    active = false;
                    alert("GAME OVER! SCORE: " + score);
                    location.reload();
                }

                // Recycle Obstacles
                if (obs.position.z > 10) {
                    obs.position.z = -480;
                    obs.position.x = (Math.random() - 0.5) * 8;
                    score++;
                    speed += 0.002;
                    document.getElementById('ui').innerText = "SCORE: " + score;
                }
            });

            camera.lookAt(ball.position);
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
